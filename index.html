<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoRecipeAI</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f5f5dc; color: #333; margin: 0; padding: 20px; }
    .container { max-width: 720px; margin: 40px auto; background: white; border-radius: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); overflow: hidden; }
    header { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; padding: 30px; text-align: center; }
    header h1 { margin: 0; font-size: 2.4rem; }
    form { padding: 35px; }
    input, textarea, button { width: 100%; padding: 16px; margin: 12px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; }
    button { background: #22c55e; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
    button:hover { background: #16a34a; }
    .diet { display: flex; gap: 12px; flex-wrap: wrap; margin: 15px 0; }
    .diet label { background: #f0fdf4; padding: 10px 16px; border-radius: 30px; cursor: pointer; }
    .loading { text-align: center; padding: 60px 20px; font-size: 1.2rem; display: none; }
    .results { padding: 35px; display: none; }
    .results h1 { color: #166534; font-size: 2rem; margin-bottom: 10px; }
    .badges { display: flex; gap: 15px; flex-wrap: wrap; margin: 20px 0; }
    .badges div { background: #f0fdf4; padding: 10px 18px; border-radius: 30px; font-weight: 600; }
    .section { margin: 30px 0; padding: 20px; background: #f9f9f9; border-radius: 12px; }
    ul, ol { padding-left: 25px; line-height: 1.7; }
    .nutrition { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; }
    .eco { background: #ecfdf5; padding: 20px; border-radius: 12px; }
    .error { color: red; text-align: center; padding: 20px; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>EcoRecipeAI</h1>
      <p>AI recipes that taste good and save the planet</p>
    </header>

    <form id="form">
      <textarea id="ingredients" placeholder="What ingredients do you have right now? (e.g. carrots, rice, tofu)" rows="4"></textarea>
      <div class="diet">
        <label><input type="checkbox" value="Vegan"> Vegan</label>
        <label><input type="checkbox" value="Vegetarian"> Vegetarian</label>
        <label><input type="checkbox" value="Gluten-Free"> Gluten-Free</label>
        <label><input type="checkbox" value="Dairy-Free"> Dairy-Free</label>
        <label><input type="checkbox" value="High-Protein"> High-Protein</label>
      </div>
      <input type="text" id="location" placeholder="Your location (e.g. New York, NY)">
      <button type="button" onclick="generateRecipe()">Generate Sustainable Recipe</button>
    </form>

    <div id="loading" class="loading">Generating your eco-friendly recipe...</div>
    <div id="error" class="error"></div>

    <div id="results" class="results">
      <h1 id="title"></h1>
      <div class="badges">
        <div>Prep: <span id="prep"></span></div>
        <div>Cook: <span id="cook"></span></div>
        <div>Servings: <span id="servings"></span></div>
      </div>
      <div class="section">
        <h3>Ingredients</h3>
        <ul id="ingredients-list"></ul>
      </div>
      <div class="section">
        <h3>Step-by-Step Instructions</h3>
        <ol id="instructions"></ol>
      </div>
      <div class="section">
        <h3>Nutrition</h3>
        <div class="nutrition">
          Calories: <span id="calories"></span> | 
          Protein: <span id="protein"></span> | 
          Carbs: <span id="carbs"></span> | 
          Fat: <span id="fat"></span>
        </div>
      </div>
      <div class="section eco">
        <h3>Eco Impact</h3>
        <p><strong>Low-Waste Score:</strong> <span id="score"></span></p>
        <p id="eco-tip"></p>
        <p id="carbon-note"></p>
      </div>
      <button onclick="location.reload()">Generate Another Recipe</button>
    </div>
  </div>

  <script>
    async function generateRecipe() {
      const ingredients = document.getElementById('ingredients').value.trim();
      if (!ingredients) return alert("Please enter some ingredients");

      const location = document.getElementById('location').value;
      const diets = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(c => c.value).join(', ');

      document.getElementById('form').style.display = 'none';
      document.getElementById('loading').style.display = 'block';
      document.getElementById('error').style.display = 'none';

      try {
        const response = await fetch('https://corsproxy.io/?' + encodeURIComponent('https://api.openai.com/v1/chat/completions'), {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer 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'
          },
          body: JSON.stringify({
            model: "gpt-4o-mini",
            messages: [{ role: "user", content: `Create a sustainable zero-waste recipe using: ${ingredients}. Dietary needs: ${diets}. Location: ${location}. Output ONLY JSON: {"title":"","prep_time":"","cook_time":"","servings":"","ingredients":[],"instructions":[],"nutrition":{"calories":"","protein":"","carbs":"","fat":""},"sustainability_score":"","eco_tip":"","carbon_note":""}` }]
          })
        });

        if (!response.ok) throw new Error("API error");

        const data = await response.json();
        const recipe = JSON.parse(data.choices[0].message.content);

        document.getElementById('loading').style.display = 'none';
        const r = document.getElementById('results');
        r.style.display = 'block';

        document.getElementById('title').textContent = recipe.title || "Your Recipe";
        document.getElementById('prep').textContent = recipe.prep_time || "N/A";
        document.getElementById('cook').textContent = recipe.cook_time || "N/A";
        document.getElementById('servings').textContent = recipe.servings || "2";

        const ingList = document.getElementById('ingredients-list');
        ingList.innerHTML = '';
        recipe.ingredients.forEach(i => {
          const li = document.createElement('li');
          li.textContent = i;
          ingList.appendChild(li);
        });

        const instrList = document.getElementById('instructions');
        instrList.innerHTML = '';
        recipe.instructions.forEach((step, i) => {
          const li = document.createElement('li');
          li.textContent = `Step ${i+1}: ${step}`;
          instrList.appendChild(li);
        });

        document.getElementById('calories').textContent = recipe.nutrition.calories || "N/A";
        document.getElementById('protein').textContent = recipe.nutrition.protein || "N/A";
        document.getElementById('carbs').textContent = recipe.nutrition.carbs || "N/A";
        document.getElementById('fat').textContent = recipe.nutrition.fat || "N/A";
        document.getElementById('score').textContent = recipe.sustainability_score || "4/5";
        document.getElementById('eco-tip').textContent = recipe.eco_tip || "Use local ingredients to reduce carbon footprint.";
        document.getElementById('carbon-note').textContent = recipe.carbon_note || "This recipe saves ~1.2 kg CO₂ vs average meal.";

      } catch (e) {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').style.display = 'block';
        document.getElementById('error').innerHTML = 'Error: Failed to generate recipe.<br>Please check your API key and try again.';
      }
    }
  </script>
</body>
</html>
