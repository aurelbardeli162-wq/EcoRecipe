<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EcoRecipeAI</title>
  <style>
    body { font-family: system-ui, sans-serif; background: #f5f5dc; color: #333; margin: 0; padding: 20px; }
    .container { max-width: 700px; margin: 0 auto; background: white; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; }
    header { background: #22c55e; color: white; padding: 20px; text-align: center; }
    form { padding: 30px; }
    input, textarea, button { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    button { background: #22c55e; color: white; font-weight: bold; cursor: pointer; }
    button:hover { background: #16a34a; }
    .loading { text-align: center; padding: 40px; display: none; }
    .results { padding: 30px; display: none; }
    .results h1 { color: #166534; }
    .section { margin: 25px 0; padding: 15px; background: #f9f9f9; border-radius: 8px; }
    ul, ol { padding-left: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>EcoRecipeAI</h1>
      <p>AI recipes that taste good and save the planet</p>
    </header>

    <form id="form">
      <textarea id="ingredients" placeholder="What ingredients do you have right now? (e.g. carrots, rice, tofu)" rows="4"></textarea>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <label><input type="checkbox" value="Vegan"> Vegan</label>
        <label><input type="checkbox" value="Vegetarian"> Vegetarian</label>
        <label><input type="checkbox" value="Gluten-Free"> Gluten-Free</label>
        <label><input type="checkbox" value="Dairy-Free"> Dairy-Free</label>
        <label><input type="checkbox" value="High-Protein"> High-Protein</label>
      </div>
      <input type="text" id="location" placeholder="Your location (e.g. New York, NY)">
      <button type="button" onclick="generateRecipe()">Generate Sustainable Recipe</button>
    </form>

    <div id="loading" class="loading">Generating your eco-friendly recipe...</div>

    <div id="results" class="results">
      <h1 id="title"></h1>
      <div style="display:flex; gap:15px; flex-wrap:wrap;">
        <div><strong>Prep:</strong> <span id="prep"></span></div>
        <div><strong>Cook:</strong> <span id="cook"></span></div>
        <div><strong>Servings:</strong> <span id="servings"></span></div>
      </div>
      <div class="section">
        <h3>Ingredients</h3>
        <ul id="ingredients-list"></ul>
      </div>
      <div class="section">
        <h3>Step-by-Step Instructions</h3>
        <ol id="instructions"></ol>
      </div>
      <div class="section">
        <h3>Nutrition</h3>
        <div>Calories: <span id="calories"></span> | Protein: <span id="protein"></span> | Carbs: <span id="carbs"></span> | Fat: <span id="fat"></span></div>
      </div>
      <div class="section">
        <h3>Eco Impact</h3>
        <p><strong>Low-Waste Score:</strong> <span id="score"></span></p>
        <p id="eco-tip"></p>
        <p id="carbon-note"></p>
      </div>
      <button onclick="location.reload()">Generate Another Recipe</button>
    </div>
  </div>

  <script>
    async function generateRecipe() {
      const ingredients = document.getElementById('ingredients').value;
      const location = document.getElementById('location').value;
      const diets = Array.from(document.querySelectorAll('input[type="checkbox"]:checked')).map(c => c.value).join(', ');

      document.getElementById('form').style.display = 'none';
      document.getElementById('loading').style.display = 'block';

      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer YOUR_OPENAI_API_KEY_HERE'
        },
        body: JSON.stringify({
          model: "gpt-4o-mini",
          messages: [{ role: "user", content: `Create a sustainable zero-waste recipe using: ${ingredients}. Dietary needs: ${diets}. Location: ${location}. Output ONLY JSON: {"title":"","prep_time":"","cook_time":"","servings":"","ingredients":[],"instructions":[],"nutrition":{"calories":"","protein":"","carbs":"","fat":""},"sustainability_score":"","eco_tip":"","carbon_note":""}` }]
        })
      });

      const data = await response.json();
      const recipe = JSON.parse(data.choices[0].message.content);

      document.getElementById('loading').style.display = 'none';
      const r = document.getElementById('results');
      r.style.display = 'block';

      document.getElementById('title').textContent = recipe.title;
      document.getElementById('prep').textContent = recipe.prep_time;
      document.getElementById('cook').textContent = recipe.cook_time;
      document.getElementById('servings').textContent = recipe.servings;

      const ingList = document.getElementById('ingredients-list');
      recipe.ingredients.forEach(i => {
        const li = document.createElement('li');
        li.textContent = i;
        ingList.appendChild(li);
      });

      const instrList = document.getElementById('instructions');
      recipe.instructions.forEach((step, i) => {
        const li = document.createElement('li');
        li.textContent = `Step ${i+1}: ${step}`;
        instrList.appendChild(li);
      });

      document.getElementById('calories').textContent = recipe.nutrition.calories;
      document.getElementById('protein').textContent = recipe.nutrition.protein;
      document.getElementById('carbs').textContent = recipe.nutrition.carbs;
      document.getElementById('fat').textContent = recipe.nutrition.fat;
      document.getElementById('score').textContent = recipe.sustainability_score;
      document.getElementById('eco-tip').textContent = recipe.eco_tip;
      document.getElementById('carbon-note').textContent = recipe.carbon_note;
    }
  </script>
</body>
</html>
